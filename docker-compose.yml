services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fraudshield
      POSTGRES_USER: fraudshield
      POSTGRES_PASSWORD: fraudshield
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraudshield -d fraudshield"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://fraudshield:fraudshield@postgres:5432/fraudshield
      MODEL_ARTIFACT_PATH: /app/model_artifact/model_metadata.json
      SEED_ON_STARTUP: "true"
      CORS_ORIGINS: http://localhost:4173,http://127.0.0.1:4173
    volumes:
      - ./ml/artifacts:/app/model_artifact:ro
    ports:
      - "8010:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8010
    ports:
      - "4173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
